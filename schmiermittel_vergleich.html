<!DOCTYPE html>
<html lang="de">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Schmiermittel Vergleich</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#e8e6df;background:#1a1a1a;font-size:14px;line-height:1.5;padding:1.5rem}
h1{font-size:20px;font-weight:500;margin-bottom:16px}
.search{width:100%;padding:8px 12px;border:0.5px solid #444;border-radius:8px;background:#2a2a2a;color:#e8e6df;font-size:14px;margin-bottom:12px}
.search:focus{outline:none;border-color:#666}
.search::placeholder{color:#888}
.filters{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.fbtn{padding:4px 14px;border-radius:8px;border:0.5px solid #444;background:transparent;color:#aaa;font-size:13px;cursor:pointer}
.fbtn:hover{border-color:#666;color:#ccc}
.fbtn.active{background:#1a3a5c;color:#85B7EB;border-color:#378ADD}
.count{font-size:13px;color:#888;margin-bottom:8px}
.scroll-wrap{overflow-x:auto}
.tbl{width:100%;border-collapse:collapse;table-layout:fixed;min-width:750px}
.tbl th{font-size:12px;font-weight:500;color:#888;text-align:left;padding:6px 4px;border-bottom:0.5px solid #333;white-space:nowrap;cursor:pointer;user-select:none}
.tbl th:hover{color:#ccc}
.tbl td{padding:8px 4px;border-bottom:0.5px solid #2a2a2a;vertical-align:middle;font-size:13px}
.tbl tr.row{cursor:pointer}
.tbl tr.row:hover{background:#222}
.cat{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:500}
.cat-oel{background:#0C447C;color:#B5D4F4}
.cat-fett{background:#27500A;color:#C0DD97}
.cat-spray{background:#633806;color:#FAC775}
.cat-spezial{background:#3C3489;color:#CECBF6}
.cat-reiniger{background:#791F1F;color:#F7C1C1}
.cat-paste{background:#72243E;color:#F4C0D1}
.bar-wrap{display:flex;align-items:center;gap:4px}
.bar{height:6px;border-radius:3px;min-width:2px}
.bar-score{font-size:11px;color:#666;min-width:22px}
.detail{display:none;background:#222;border-radius:8px;padding:12px 16px;margin:0 0 4px}
.detail.open{display:block}
.detail p{font-size:13px;color:#aaa;margin-bottom:8px}
.detail strong{color:#e8e6df;font-weight:500}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
.tag{font-size:11px;padding:2px 8px;border-radius:8px;background:#333;color:#aaa}
.uc-box{margin-top:8px;padding:8px 12px;border:0.5px solid #333;border-radius:8px;background:#1a1a1a}
.uc-box li{font-size:13px;color:#aaa;margin:2px 0 2px 16px}
</style>
</head>
<body>
<h1>Schmiermittel Vergleich</h1>
<input class="search" id="search" placeholder="Schmiermittel oder Use Case suchen...">
<div class="filters" id="filters"></div>
<div class="count" id="count"></div>
<div class="scroll-wrap">
<table class="tbl" id="tbl">
<thead><tr>
<th style="width:130px" data-key="name">Produkt ▲</th>
<th style="width:80px" data-key="cat">Kategorie</th>
<th style="width:72px" data-key="schmierung">Schmierung</th>
<th style="width:72px" data-key="kriechfaehigkeit">Kriechfähigk.</th>
<th style="width:72px" data-key="wasserbestaendigkeit">Wasserres.</th>
<th style="width:72px" data-key="temperatur">Temp.beständ.</th>
<th style="width:72px" data-key="kunststoffvertraeglichkeit">Kunststoffvert.</th>
<th style="width:72px" data-key="haltbarkeit">Haltbarkeit</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
const colors={schmierung:'#378ADD',kriechfaehigkeit:'#1D9E75',wasserbestaendigkeit:'#D85A30',temperatur:'#D4537E',kunststoffvertraeglichkeit:'#7F77DD',haltbarkeit:'#639922'};
const data=[
{name:"WD-40 Classic",cat:"Spray",catCls:"spray",schmierung:3,kriechfaehigkeit:9,wasserbestaendigkeit:4,temperatur:4,kunststoffvertraeglichkeit:5,haltbarkeit:2,desc:"Universalmittel, primär Kriechöl und Feuchtigkeitsverdränger. Kein echtes Schmiermittel für Dauereinsatz.",tags:["Kriechöl","Feuchtigkeitsverdränger","Kurzzeit"],useCases:["Festsitzende Schrauben lösen","Feuchtigkeit verdrängen","Leichte Rostlösung","Quietschende Scharniere (kurzfristig)","Aufkleber entfernen"]},
{name:"WD-40 Specialist Silikonspray",cat:"Spray",catCls:"spray",schmierung:5,kriechfaehigkeit:7,wasserbestaendigkeit:7,temperatur:7,kunststoffvertraeglichkeit:10,haltbarkeit:4,desc:"Silikonbasiertes Spray, ideal für Kunststoff und Gummi. Hinterlässt keinen klebrigen Film.",tags:["Silikon","Kunststoffsicher","Trockenschmierung"],useCases:["Gummidichtungen pflegen","Kunststoffteile schmieren","Laufbänder","Schiebetüren und Schubladen","3D-Druck Bett-Trennmittel"]},
{name:"Super Lube Synth. Öl (PTFE)",cat:"Öl",catCls:"oel",schmierung:9,kriechfaehigkeit:6,wasserbestaendigkeit:8,temperatur:8,kunststoffvertraeglichkeit:9,haltbarkeit:8,desc:"Hochwertiges synthetisches Öl mit PTFE (Teflon). NSF H1 lebensmittelzugelassen. Universell einsetzbar.",tags:["PTFE","Synthetisch","Lebensmittelsicher","NSF H1"],useCases:["Feinmechanik (Schlösser, Uhren)","Kugellager schmieren","3D-Drucker Linearschienen","Fahrradketten","Küchengeräte (lebensmittelsicher)"]},
{name:"Super Lube Synth. Fett (PTFE)",cat:"Fett",catCls:"fett",schmierung:9,kriechfaehigkeit:2,wasserbestaendigkeit:9,temperatur:8,kunststoffvertraeglichkeit:9,haltbarkeit:9,desc:"Synthetisches Mehrzweckfett mit PTFE. Sehr langlebig, auch unter Wasser. NSF H1.",tags:["PTFE","Synthetisch","Lebensmittelsicher","Langzeit"],useCases:["Kugellager Dauerschmierung","Zahnräder (Kunststoff + Metall)","O-Ring Schmierung","Gewinde Montage","Outdoor-Mechanik (wetterfest)"]},
{name:"Ballistol Universal",cat:"Öl",catCls:"oel",schmierung:6,kriechfaehigkeit:7,wasserbestaendigkeit:5,temperatur:5,kunststoffvertraeglichkeit:7,haltbarkeit:5,desc:"Biologisch abbaubares Universalöl. Klassiker für Waffenpflege, auch Holz und Lederpflege.",tags:["Biologisch abbaubar","Universal","Waffenpflege"],useCases:["Waffenreinigung und -pflege","Holzpflege","Lederpflege","Gartengeräte","Angelrollen"]},
{name:"Brunox Turbo-Spray",cat:"Spray",catCls:"spray",schmierung:5,kriechfaehigkeit:9,wasserbestaendigkeit:6,temperatur:5,kunststoffvertraeglichkeit:7,haltbarkeit:4,desc:"Schweizer Kriechöl mit Turboline-Effekt. Sehr gute Kriech- und Reinigungswirkung.",tags:["Kriechöl","Korrosionsschutz","Reinigung"],useCases:["Elektrische Kontakte reinigen","Korrosionsschutz","Schlösser gängig machen","Fahrradpflege","Rostlöser"]},
{name:"Caramba Silikonspray",cat:"Spray",catCls:"spray",schmierung:5,kriechfaehigkeit:6,wasserbestaendigkeit:7,temperatur:7,kunststoffvertraeglichkeit:10,haltbarkeit:4,desc:"Günstiges Silikonspray für Haushalt und Werkstatt. Guter Allrounder für Kunststoff.",tags:["Silikon","Kunststoffsicher","Preiswert"],useCases:["Türdichtungen Auto pflegen","Schubladen und Schienen","Kunststoff-Zahnräder","Fenster- und Türgummis","Nähmaschinen (Kunststoffteile)"]},
{name:"Liqui Moly PTFE-Pulverspray",cat:"Spray",catCls:"spray",schmierung:7,kriechfaehigkeit:5,wasserbestaendigkeit:7,temperatur:8,kunststoffvertraeglichkeit:9,haltbarkeit:7,desc:"Trockenschmierstoff auf PTFE-Basis. Zieht keinen Staub an, ideal für saubere Umgebungen.",tags:["PTFE","Trockenschmierung","Staubfrei"],useCases:["Schiebedächer","Kabelzüge","Scharniere in staubiger Umgebung","Kunststoff-auf-Kunststoff","3D-Drucker Führungen"]},
{name:"Graphitpulver / -spray",cat:"Spezial",catCls:"spezial",schmierung:7,kriechfaehigkeit:3,wasserbestaendigkeit:6,temperatur:10,kunststoffvertraeglichkeit:4,haltbarkeit:8,desc:"Trockenschmierstoff für extreme Temperaturen. Elektrisch leitfähig, nicht für Elektronik.",tags:["Trockenschmierung","Hochtemperatur","Leitfähig"],useCases:["Schlösser (Profilzylinder)","Ofentüren / Hochtemperatur","Gewindeschmierung bei Hitze","Bremsführungen","Industrieöfen"]},
{name:"Kupferpaste",cat:"Paste",catCls:"paste",schmierung:5,kriechfaehigkeit:1,wasserbestaendigkeit:8,temperatur:10,kunststoffvertraeglichkeit:2,haltbarkeit:9,desc:"Hochtemperatur-Montagepaste auf Kupferbasis. Verhindert Festfressen bei extremer Hitze.",tags:["Hochtemperatur","Montagepaste","Anti-Seize"],useCases:["Bremsbeläge Rückenplatte","Zündkerzengewinde","Auspuffschrauben","Felgenschrauben","Industrieöfen-Montage"]},
{name:"Keramikpaste",cat:"Paste",catCls:"paste",schmierung:6,kriechfaehigkeit:1,wasserbestaendigkeit:9,temperatur:10,kunststoffvertraeglichkeit:6,haltbarkeit:9,desc:"Metallfrei, für extrem hohe Temperaturen. Nicht leitfähig, daher auch für Elektronik-Nähe geeignet.",tags:["Hochtemperatur","Metallfrei","Nicht leitfähig"],useCases:["Bremsführungsbolzen","Lambdasonden-Gewinde","Glühkerzen","Turbolader-Schrauben","Edelstahl-Verbindungen (Anti-Seize)"]},
{name:"Weiße Vaseline / Petrolatum",cat:"Fett",catCls:"fett",schmierung:4,kriechfaehigkeit:1,wasserbestaendigkeit:8,temperatur:3,kunststoffvertraeglichkeit:8,haltbarkeit:6,desc:"Günstiger Basisschutz für Gummi und leichte Schmierung. Nicht für hohe Belastung.",tags:["Preiswert","Kunststoffsicher","Dichtungspflege"],useCases:["Batteriepole schützen","Gummidichtungen pflegen","O-Ringe montieren","Leichte Gleitflächen","Kabeldurchführungen abdichten"]},
{name:"Lithiumfett (weiß)",cat:"Fett",catCls:"fett",schmierung:7,kriechfaehigkeit:2,wasserbestaendigkeit:7,temperatur:6,kunststoffvertraeglichkeit:5,haltbarkeit:7,desc:"Klassisches KFZ-Schmierfett. Guter Allrounder für Metall-auf-Metall.",tags:["KFZ","Mehrzweck","Metall"],useCases:["Türscharniere Auto","Seilzüge und Bowdenzüge","Kugelgelenke","Schleppdach-Mechanik","Garagentor-Schienen"]},
{name:"Molybdändisulfid-Fett (MoS2)",cat:"Fett",catCls:"fett",schmierung:9,kriechfaehigkeit:2,wasserbestaendigkeit:7,temperatur:8,kunststoffvertraeglichkeit:3,haltbarkeit:8,desc:"Extremdruck-Schmierfett mit MoS2. Für sehr hohe Lasten und langsame Bewegungen.",tags:["Extremdruck","MoS2","Hochlast"],useCases:["Kugelgelenke (Fahrwerk)","Schwere Scharniere","Getriebelager","Winden und Seilzüge","Landmaschinen"]},
{name:"Teflonspray (PTFE trocken)",cat:"Spray",catCls:"spray",schmierung:6,kriechfaehigkeit:6,wasserbestaendigkeit:6,temperatur:7,kunststoffvertraeglichkeit:10,haltbarkeit:5,desc:"Trockener PTFE-Film. Zieht keinen Staub an. Ideal für Kunststoff und saubere Bereiche.",tags:["PTFE","Trockenschmierung","Kunststoffsicher"],useCases:["Drucker- und Kopiermechanik","Reißverschlüsse","Schubladen-Schienen","Fenster-Beschläge","Spielzeug-Mechanik"]},
{name:"Bremsenreiniger",cat:"Reiniger",catCls:"reiniger",schmierung:0,kriechfaehigkeit:8,wasserbestaendigkeit:1,temperatur:1,kunststoffvertraeglichkeit:2,haltbarkeit:0,desc:"Reines Lösemittel, KEIN Schmiermittel. Entfernt Fett, Öl und Verschmutzungen rückstandsfrei.",tags:["Entfetter","Reiniger","Rückstandsfrei"],useCases:["Bremsscheiben reinigen","Flächen vor Kleben entfetten","Oberflächen vor Lackieren entfetten","Elektrische Kontakte reinigen","Kettenglieder entfetten vor Neuschmierung"]},
{name:"Kontaktspray (Kontakt 60/61)",cat:"Spezial",catCls:"spezial",schmierung:1,kriechfaehigkeit:8,wasserbestaendigkeit:3,temperatur:3,kunststoffvertraeglichkeit:4,haltbarkeit:2,desc:"Spezialreiniger für elektrische Kontakte. Löst Oxidation und verbessert Leitfähigkeit.",tags:["Elektronik","Kontaktreiniger","Oxidlöser"],useCases:["Schalter und Relais reinigen","Stecker und Buchsen","Potentiometer kratzen beseitigen","Sicherungskasten","Fahrzeugelektrik"]},
{name:"Siliconfett (dickflüssig)",cat:"Fett",catCls:"fett",schmierung:6,kriechfaehigkeit:1,wasserbestaendigkeit:9,temperatur:7,kunststoffvertraeglichkeit:10,haltbarkeit:7,desc:"Dickflüssiges Silikonfett, ideal für Dichtungen und Ventile. Extrem gute Materialverträglichkeit.",tags:["Silikon","Dichtungen","Kunststoffsicher"],useCases:["Wasserhahn-Kartuschen","Tauchausrüstung O-Ringe","Espressomaschinen-Dichtungen","Aquarium-Ventile","Sanitärarmaturen"]},
{name:"Kettenöl (Fahrrad, trocken)",cat:"Öl",catCls:"oel",schmierung:6,kriechfaehigkeit:5,wasserbestaendigkeit:4,temperatur:5,kunststoffvertraeglichkeit:6,haltbarkeit:4,desc:"Dünnes Schmieröl speziell für Fahrradketten. Trockene Variante zieht weniger Schmutz an.",tags:["Fahrrad","Kette","Trockenwetter"],useCases:["Fahrradkette (Trockenwetter)","Umwerfer und Schaltwerk","Bremszüge innen","Federgabeln (leicht)","Pedalgewinde"]},
{name:"Kettenspray (Motorrad, nass)",cat:"Spray",catCls:"spray",schmierung:8,kriechfaehigkeit:5,wasserbestaendigkeit:8,temperatur:6,kunststoffvertraeglichkeit:5,haltbarkeit:6,desc:"Speziell für O-Ring und X-Ring Motorradketten. Haftstark und wasserbeständig.",tags:["Motorrad","Kette","O-Ring-sicher"],useCases:["Motorrad-Antriebskette","Rollenketten","Schneemobil-Ketten","Kettensäge (bedingt)","Go-Kart-Ketten"]},
{name:"Nähmaschinenöl",cat:"Öl",catCls:"oel",schmierung:5,kriechfaehigkeit:6,wasserbestaendigkeit:3,temperatur:3,kunststoffvertraeglichkeit:7,haltbarkeit:3,desc:"Sehr dünnflüssiges, farbloses Feinmechanik-Öl. Für leichte Anwendungen ohne große Last.",tags:["Feinmechanik","Dünnflüssig","Farblos"],useCases:["Nähmaschinen","Scheren und Zangen","Angelrollen (leicht)","Büroschlösser","Uhren (grob)"]}
];

const cats=["Alle","Öl","Fett","Spray","Spezial","Paste","Reiniger"];
const catMap={Alle:"",Öl:"oel",Fett:"fett",Spray:"spray",Spezial:"spezial",Paste:"paste",Reiniger:"reiniger"};
const props=["schmierung","kriechfaehigkeit","wasserbestaendigkeit","temperatur","kunststoffvertraeglichkeit","haltbarkeit"];

let activeCat="Alle";
let sortKey="name";
let sortAsc=true;
let openRow=null;

const filtersEl=document.getElementById("filters");
const tbodyEl=document.getElementById("tbody");
const countEl=document.getElementById("count");
const searchEl=document.getElementById("search");

cats.forEach(c=>{
  const b=document.createElement("button");
  b.className="fbtn"+(c==="Alle"?" active":"");
  b.textContent=c;
  b.onclick=()=>{
    activeCat=c;
    document.querySelectorAll(".fbtn").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    render();
  };
  filtersEl.appendChild(b);
});

document.querySelectorAll(".tbl th").forEach(th=>{
  th.onclick=()=>{
    const k=th.dataset.key;
    if(!k)return;
    if(sortKey===k)sortAsc=!sortAsc;
    else{sortKey=k;sortAsc=k==="name";}
    render();
  };
});

searchEl.oninput=()=>render();

function bar(val,key){
  const w=Math.max(val*10,2);
  return '<div class="bar-wrap"><div class="bar" style="width:'+w+'%;background:'+colors[key]+'"></div><span class="bar-score">'+val+'/10</span></div>';
}

function render(){
  const q=searchEl.value.toLowerCase();
  let filtered=data.filter(d=>{
    if(activeCat!=="Alle"&&catMap[activeCat]!==d.catCls)return false;
    if(q){
      const hay=(d.name+" "+d.cat+" "+d.desc+" "+d.tags.join(" ")+d.useCases.join(" ")).toLowerCase();
      return hay.includes(q);
    }
    return true;
  });

  filtered.sort((a,b)=>{
    let va=a[sortKey],vb=b[sortKey];
    if(typeof va==="string")return sortAsc?va.localeCompare(vb):vb.localeCompare(va);
    return sortAsc?va-vb:vb-va;
  });

  countEl.textContent=filtered.length+" Schmiermittel";

  let html="";
  filtered.forEach(d=>{
    const isOpen=openRow===d.name;
    html+='<tr class="row" data-name="'+d.name+'">';
    html+='<td style="font-weight:500">'+d.name+'</td>';
    html+='<td><span class="cat cat-'+d.catCls+'">'+d.cat+'</span></td>';
    props.forEach(p=>{html+='<td>'+bar(d[p],p)+'</td>';});
    html+='</tr>';
    html+='<tr><td colspan="8"><div class="detail'+(isOpen?' open':'')+'">'; 
    html+='<p><strong>'+d.name+'</strong> — '+d.desc+'</p>';
    html+='<div class="tags">'+d.tags.map(t=>'<span class="tag">'+t+'</span>').join("")+'</div>';
    html+='<div class="uc-box"><strong style="font-size:13px">Beispiel Use Cases</strong><ul>'+d.useCases.map(u=>'<li>'+u+'</li>').join("")+'</ul></div>';
    html+='</div></td></tr>';
  });
  tbodyEl.innerHTML=html;

  tbodyEl.querySelectorAll("tr.row").forEach(tr=>{
    tr.onclick=()=>{
      const n=tr.dataset.name;
      openRow=openRow===n?null:n;
      render();
    };
  });
}
render();
</script>
</body>
</html>
